; ┌─────────────────────────────────────────────────────────────┐
; │  KurDom — Nginx Production Config                           │
; │  Copy to /etc/nginx/sites-available/kurdom                  │
; │  ln -s /etc/nginx/sites-available/kurdom                    │
; │        /etc/nginx/sites-enabled/kurdom                      │
; └─────────────────────────────────────────────────────────────┘

; Adjust domain, SSL paths, and PHP-FPM socket as needed.

server {
    listen 80;
    listen [::]:80;
    server_name kurdom.id www.kurdom.id;
    return 301 https://kurdom.id$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name kurdom.id www.kurdom.id;
    root /var/www/kurdom/public;
    index index.php;

    # ── SSL (Let's Encrypt) ────────────────
    ssl_certificate /etc/letsencrypt/live/kurdom.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kurdom.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Gzip ───────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Security Headers ───────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logging ────────────────────────────
    access_log /var/log/nginx/kurdom-access.log;
    error_log /var/log/nginx/kurdom-error.log;

    # ── Upload Limits ──────────────────────
    client_max_body_size 100M;

    # ── Livewire ───────────────────────────
    location ~ ^/livewire {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Laravel Routing ────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffering off;
        fastcgi_read_timeout 300;
    }

    # ── Deny Hidden Files ──────────────────
    location ~ /\. {
        deny all;
    }

    # ── Static Assets Cache ────────────────
    location ~* ^/build/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Reverb WebSocket Proxy ─────────────
    location /app {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
